		<link rel="icon" type="image/webp" href="/logo.webp" />
		<link rel="apple-touch-icon" href="/logo.webp" />

        <!-- DNS prefetch for third-party origins (cheap, no blocking) -->
        <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
        <link rel="dns-prefetch" href="https://www.google-analytics.com" />
        <link rel="dns-prefetch" href="https://images.unsplash.com" />

        <!-- Preconnect only for font origins used above the fold -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="preconnect" href="https://kejitvcoalooiwbcwelt.supabase.co" />

        <!-- Preload LCP background image (critical path) -->
        <link rel="preload" href="/images/fondo/site-background.webp" as="image" fetchpriority="high" />

        <!-- Google Fonts: non-blocking (Manrope + Space Grotesk in one request) -->
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Space+Grotesk:wght@300;500;700&display=swap" media="print" onload="this.media='all'" />
        <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Space+Grotesk:wght@300;500;700&display=swap" /></noscript>

        <!-- Material Symbols: non-blocking -->
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" media="print" onload="this.media='all'" />
        <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" /></noscript>

        <!-- Google Analytics: deferred to avoid blocking FCP -->
        <script>
          window.addEventListener('load', function() {
            var s = document.createElement('script');
            s.src = 'https://www.googletagmanager.com/gtag/js?id=G-LVS1N7VC7G';
            s.async = true;
            document.head.appendChild(s);
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', 'G-LVS1N7VC7G', { send_page_view: true });
          });
        </script>

		<title>SEO Growthers - Web Development, SEO & Analytics</title>

        <style>
            :root {
                --sat: env(safe-area-inset-top);
                --sar: env(safe-area-inset-right);
                --sab: env(safe-area-inset-bottom);
                --sal: env(safe-area-inset-left);
            }
            body {
                padding-top: var(--sat);
                padding-left: var(--sal);
                padding-right: var(--sar);
                /* Bottom padding handled by layout for tab bar */
            }
            .pb-safe {
                padding-bottom: var(--sab) !important;
            }
            /* Font Display Swap for all fonts */
            @font-face {
                font-family: 'Inter';
                font-display: swap;
                src: local('Inter');
            }
        </style>
	</head>
